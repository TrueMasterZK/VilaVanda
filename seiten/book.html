    <section class="booking-section">

        <h1>Book Your Stay</h1>

        <form action="https://api.web3forms.com/submit" method="POST" class="booking-form">

            <input type="hidden" name="access_key" value="29c7bd7e-8845-421a-b748-42751c2fa36f">

            <input type="text" name="name" placeholder="Full Name" required>

            <input type="email" name="email" placeholder="E-Mail Address" required>

            <input type="tel" name="phone" placeholder="Phone Number" pattern="^[0-9+\s()-]+$"
                title="Only numbers, +, spaces, () and - are allowed" required>

            <label>Check-in</label>
            <input type="date" name="checkin" required>

            <label>Check-out</label>
            <input type="date" name="checkout" required>

            <label>Select Apartment(s)</label>

            <div class="apartment-options">

                <label>
                    <input type="checkbox" id="vanda" name="apartment[]" value="Vanda">
                    Vanda
                </label>

                <label>
                    <input type="checkbox" id="mila" name="apartment[]" value="Mila">
                    Mila
                </label>

                <label>
                    <input type="checkbox" id="nina" name="apartment[]" value="Nina">
                    Nina
                </label>

                <label>
                    <input type="checkbox" id="wholeHouse" name="apartment[]" value="Whole House">
                    Whole House
                </label>

            </div>
            <p id="warning" style="color: rgb(2,54,47); font-family: Arial; margin-top: 10px;"></p>

            <label>Guests</label>
            <input type="number" name="guests" min="1" max="12">

            <textarea name="message" placeholder="Additional Information"></textarea>

            <button type="submit">
                Send Booking Request
            </button>

        </form>

    </section>
    <script>
        const wholeHouse = document.getElementById("wholeHouse");
        const others = [
            document.getElementById("vanda"),
            document.getElementById("mila"),
            document.getElementById("nina")
        ];

        wholeHouse.addEventListener("change", function () {
            if (this.checked) {
                // andere deaktivieren
                others.forEach(cb => {
                    cb.checked = false;
                    cb.disabled = true;
                });
            } else {
                // wieder aktivieren
                others.forEach(cb => {
                    cb.disabled = false;
                });
            }
        });

        // optional: wenn andere angeklickt werden → whole house deaktivieren
        others.forEach(cb => {
            cb.addEventListener("change", () => {
                if (cb.checked) {
                    wholeHouse.checked = false;
                    wholeHouse.disabled = true;
                } else {
                    // wenn keiner mehr aktiv ist → whole house wieder erlauben
                    if (!others.some(c => c.checked)) {
                        wholeHouse.disabled = false;
                    }
                }
            });
        });
    </script>
    <script>
        const vanda = document.getElementById("vanda");
        const mila = document.getElementById("mila");
        const nina = document.getElementById("nina");
        const whole = document.getElementById("wholeHouse");
        const warning = document.getElementById("warning");

        function checkSelection() {
            const allThree = vanda.checked && mila.checked && nina.checked;

            if (allThree) {
                warning.textContent = "Please select Whole House instead.";
            } else {
                warning.textContent = "";
            }
        }

        // Event Listener auf alle 3
        [vanda, mila, nina].forEach(cb => {
            cb.addEventListener("change", checkSelection);
        });
    </script>
